# Workflow Config Example
# 用户可复制此文件到 .claude/workflow-config.yaml 自定义工作流行为

# 质量门配置
qualityGates:
  review:
    maxIterations: 3           # 最多循环次数
    agent: code-reviewer      # 使用的 agent
    blockOnCritical: true    # CRITICAL 问题是否阻止

  test:
    maxIterations: 3
    agent: test-agent
    coverageThreshold: 80     # 覆盖率阈值 %
    failOnError: true        # 测试失败是否阻止

  lint:
    maxIterations: 3
    agent: lint-agent
    failOnError: true        # Error 是否阻止 (warnings 不阻止)
    maxWarnings: 10          # 最大 warnings 数量

# 工作流步骤 (可选，用于自定义流程)
# workflowSteps:
#   - name: spec
#     enabled: true
#   - name: planner
#     enabled: true
#   - name: tdd
#     enabled: true
#   - name: develop
#     enabled: true
#   - name: quality-gate
#     type: review
#     enabled: true
#   - name: quality-gate
#     type: test
#     enabled: true
#   - name: quality-gate
#     type: lint
#     enabled: true
#   - name: pr
#     enabled: true

# 全局配置
global:
  maxTotalIterations: 10     # 所有 quality gate 总迭代上限
  notifyOnBlocked: true      # 阻塞时通知用户
  saveStateOnComplete: true  # 完成时保存状态

# 示例：自定义覆盖率要求
# qualityGates:
#   test:
#     coverageThreshold: 90   # 更高要求
#     maxIterations: 5        # 更多修复尝试

# 示例：简化流程 (跳过某些步骤)
# workflowSteps:
#   - name: spec
#     enabled: false          # 跳过 spec
#   - name: planner
#     enabled: false          # 跳过 planner
